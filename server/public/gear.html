<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gear Details</title>
  <script defer src="/scripts/header.js"></script>
  <script defer src="/scripts/gear.js"></script>
</head>
<body>
  <header></header>

  <main id="gear-content" style="display:flex; flex-wrap:wrap; justify-content:center; gap:20px; margin-top:25px;">
    
    <!-- Image section -->
    <div class="image-container" style="width:40vw; min-width:250px;">
      <img id="image" src="" alt="Gear Image" style="width:100%; object-fit:cover; border-radius:8px;">
    </div>

    <!-- Details section -->
    <div class="gear-details" style="width:45vw; min-width:250px;">
      <h2 id="name" style="margin-bottom:10px;"></h2>
      <p id="submittedBy" style="margin:6px 0;"></p>
      <p id="submittedOn" style="margin:6px 0;"></p>
      <p id="pricePoint" style="margin:6px 0;"></p>
      <p id="audience" style="margin:6px 0;"></p>
      <p id="description" style="margin:6px 0;"></p>
    </div>

  </main>
</body>
</html>
